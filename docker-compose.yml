name: location-microservice
services:
  location-microservice:
    container_name: location-microservice
    build:
      context: .
  nginx-service:
    container_name: nginx-service
    image: nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "443:443"
      - "80:80"